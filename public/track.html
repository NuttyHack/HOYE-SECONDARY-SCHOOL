<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Application | Hoye Secondary School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .header-gradient {
            background: linear-gradient(90deg, #2c3e50, #3498db);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .btn-track {
            background: #3498db;
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-track:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .status-box {
            border-radius: 15px;
            padding: 20px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
        }

        /* Modern Timeline UI */
        .timeline {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-top: 30px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: #dee2e6;
            z-index: 1;
        }
        .step {
            z-index: 2;
            text-align: center;
            width: 30%;
        }
        .step-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: white;
            border: 2px solid #dee2e6;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 14px;
        }
        .step.active .step-icon {
            background: #3498db;
            color: white;
            border-color: #3498db;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }
        .step.completed .step-icon {
            background: #2ecc71;
            color: white;
            border-color: #2ecc71;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card shadow border-0">
                <div class="header-gradient">
                    <i class="bi bi-shield-check fs-1 mb-2"></i>
                    <h2 class="fw-bold">Hoye Portal</h2>
                    <p class="mb-0 opactiy-75">Admission Tracking System</p>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <div id="search-section">
                        <label class="form-label fw-semibold">Reference Number</label>
                        <div class="input-group mb-4">
                            <span class="input-group-text bg-white"><i class="bi bi-hash"></i></span>
                            <input type="text" id="trackInput" class="form-control" placeholder="e.g. HY-2026-A1B2">
                        </div>
                        <button onclick="checkStatus()" id="btnText" class="btn btn-primary btn-track w-100">
                            Check My Status
                        </button>
                    </div>

                    <div id="statusResult" style="display:none;">
                        <div class="status-box text-center mb-4">
                            <h6 class="text-muted mb-1">Applicant Name</h6>
                            <h5 id="applicantName" class="fw-bold mb-3">...</h5>
                            <hr>
                            <h6 class="text-muted mb-2">Current Standing</h6>
                            <span id="statusBadge" class="badge p-2 px-3 rounded-pill"></span>
                        </div>

                        <div class="timeline">
                            <div class="step completed" id="step1">
                                <div class="step-icon"><i class="bi bi-file-earmark-check"></i></div>
                                <small>Applied</small>
                            </div>
                            <div class="step" id="step2">
                                <div class="step-icon"><i class="bi bi-hourglass-split"></i></div>
                                <small>Review</small>
                            </div>
                            <div class="step" id="step3">
                                <div class="step-icon"><i class="bi bi-check-circle"></i></div>
                                <small>Decision</small>
                            </div>
                        </div>

                        <button onclick="location.reload()" class="btn btn-link btn-sm w-100 mt-5 text-decoration-none">
                            <i class="bi bi-arrow-left"></i> Track another number
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function checkStatus() {
    const ref = document.getElementById('trackInput').value;
    const searchSection = document.getElementById('search-section');
    const resDiv = document.getElementById('statusResult');
    const btn = document.getElementById('btnText');

    if(!ref) return alert("Please enter a tracking number");

    btn.innerText = "Searching...";
    btn.disabled = true;

    try {
        const response = await fetch(`../app/track_status.php?ref=${ref}`);
        const result = await response.json();

        if (result.status === 'success') {
            const data = result.data;
            searchSection.style.display = 'none';
            resDiv.style.display = 'block';
            
            document.getElementById('applicantName').innerText = data.first_name + " " + (data.last_name || "");
            
            const badge = document.getElementById('statusBadge');
            badge.innerText = data.status.toUpperCase();

            // Handle Timeline and Badge logic
            if (data.status === 'pending') {
                badge.className = 'badge bg-warning text-dark';
                document.getElementById('step2').className = 'step active';
            } else if (data.status === 'accepted') {
                badge.className = 'badge bg-success';
                document.getElementById('step2').className = 'step completed';
                document.getElementById('step3').className = 'step active completed';
            } else if (data.status === 'rejected') {
                badge.className = 'badge bg-danger';
                document.getElementById('step2').className = 'step completed';
                document.getElementById('step3').className = 'step active';
                document.getElementById('step3').innerHTML = '<div class="step-icon bg-danger text-white"><i class="bi bi-x-circle"></i></div><small>Rejected</small>';
            }
        } else {
            alert(result.message);
            btn.innerText = "Check My Status";
            btn.disabled = false;
        }
    } catch (err) {
        alert("System Error. Please try again.");
        btn.disabled = false;
    }
}
</script>

</body>
</html>
